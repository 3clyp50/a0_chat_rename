<html>
<head>
  <script type="module">
    import { store } from "/plugins/chat_rename/webui/chat-rename-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.chatRename">
      <div
        class="chat-rename-sidebar-anchor"
        x-create="$store.chatRename.mountSidebarEnhancer()"
        x-destroy="$store.chatRename.cleanupSidebarEnhancer()"
      ></div>
    </template>
  </div>

  <!-- Lightweight click handler: collapse expanded menus on outside click -->
  <script>
    document.addEventListener("click", () => {
      document.querySelectorAll(".chat-actions-expanded").forEach((r) => {
        r.classList.remove("chat-actions-expanded");
        const btn = r.querySelector(".chat-more-actions-btn");
        if (btn) btn.setAttribute("aria-expanded", "false");
      });
    });
  </script>

  <style>
    .chat-rename-sidebar-anchor {
      display: none;
    }

    /* ================================================================
       COMPACT SIDEBAR BUTTONS

       A0 hardcodes <body class="device-pointer"> — no JS toggles
       device-touch. Therefore we use CSS media queries for reliable
       input detection AND prefix touch selectors with .device-pointer
       (since it's always present) to win specificity battles.

       @media (hover: hover) and (pointer: fine)  = pointer/desktop
       @media (hover: none) and (pointer: coarse)  = touch/mobile
       ================================================================ */

    /* --- Default compact sizing (all devices) --- */
    .chat-container .chat-list-action-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      margin-right: 2px;
    }
    .chat-container .chat-list-action-btn .material-symbols-outlined {
      font-size: 16px;
    }

    /* --- Three-dot button: hidden by default everywhere --- */
    .chat-more-actions-btn {
      display: none !important;
    }

    /* ================================================================
       POINTER DEVICES (desktop/laptop)
       Hide buttons when not interacting; show on hover or keyboard.
       ================================================================ */
    .device-pointer .chat-container:not(:hover):not(:focus-within) .chat-list-action-btn {
      display: none !important;
    }
    .device-pointer .chat-container:hover .chat-list-action-btn,
    .device-pointer .chat-container:focus-within .chat-list-action-btn {
      display: inline-flex !important;
    }
    .device-pointer .chat-container:hover .chat-more-actions-btn,
    .device-pointer .chat-container:focus-within .chat-more-actions-btn {
      display: none !important;
    }

    /* ================================================================
       TOUCH DEVICES (mobile/tablet)
       Detected via @media (hover: none) and (pointer: coarse).
       Since body always has .device-pointer, we prefix selectors
       with body.device-pointer to MATCH specificity and win by
       source order (these rules come after the pointer rules above).
       ================================================================ */
    @media (hover: none) and (pointer: coarse) {
      /* Larger tap targets */
      body.device-pointer .chat-container .chat-list-action-btn {
        width: 36px;
        height: 36px;
        min-width: 36px;
        margin-right: 4px;
      }
      body.device-pointer .chat-container .chat-list-action-btn .material-symbols-outlined {
        font-size: 22px;
      }

      /* Override pointer rules: hide ALL buttons always (not just non-hover) */
      body.device-pointer .chat-container .chat-list-action-btn {
        display: none !important;
      }
      body.device-pointer .chat-container:hover .chat-list-action-btn {
        display: none !important;
      }
      body.device-pointer .chat-container:focus-within .chat-list-action-btn {
        display: none !important;
      }

      /* Show only three-dot on selected chat */
      body.device-pointer .chat-container.chat-selected .chat-more-actions-btn {
        display: inline-flex !important;
      }

      /* When expanded: show all action buttons, hide three-dot */
      body.device-pointer .chat-container.chat-actions-expanded .chat-list-action-btn {
        display: inline-flex !important;
      }
      body.device-pointer .chat-container.chat-actions-expanded .chat-more-actions-btn {
        display: none !important;
      }
    }

    /* ================================================================
       FALLBACK: A0's .device-touch class (if ever added dynamically)
       Same rules but using the class selector.
       ================================================================ */
    .device-touch .chat-container .chat-list-action-btn {
      width: 36px;
      height: 36px;
      min-width: 36px;
      margin-right: 4px;
    }
    .device-touch .chat-container .chat-list-action-btn .material-symbols-outlined {
      font-size: 22px;
    }
    .device-touch .chat-container .chat-list-action-btn {
      display: none !important;
    }
    .device-touch .chat-container.chat-selected .chat-more-actions-btn {
      display: inline-flex !important;
    }
    .device-touch .chat-container.chat-actions-expanded .chat-list-action-btn {
      display: inline-flex !important;
    }
    .device-touch .chat-container.chat-actions-expanded .chat-more-actions-btn {
      display: none !important;
    }
  </style>
</body>
</html>
